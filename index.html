<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lista della Spesa (Sync)</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      max-width: 760px;
      margin: 24px auto;
      padding: 0 16px;
    }
    h1 { font-size: 22px; margin: 0 0 12px; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .user { font-size: 13px; opacity: .85; }

    .row { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }

    input[type="text"] {
      flex: 1;
      min-width: 220px;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #8885;
      border-radius: 10px;
      outline: none;
    }

    button {
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #8885;
      border-radius: 10px;
      cursor: pointer;
    }
    button.primary { font-weight: 600; }
    button.danger { border-color: #c33a; }
    button.secondary { opacity: .9; }
    button:disabled { opacity: .5; cursor: not-allowed; }

    ul { list-style: none; padding: 0; margin: 14px 0 0; }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #8883;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .item-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .drag-handle {
      user-select: none;
      cursor: grab;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid #8883;
      font-size: 14px;
      opacity: .9;
    }
    .drag-handle:active { cursor: grabbing; }

    .item-text { word-break: break-word; flex: 1; min-width: 0; }

    .muted { opacity: 0.75; font-size: 12px; margin-top: 8px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .hidden { display: none; }
    .status { font-size: 13px; opacity: .85; margin-top: 8px; }

    /* feedback drag */
    li.drag-over { outline: 2px dashed #6aa; outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🛒 Lista della Spesa (condivisione PC/Telefono)</h1>
    <div>
      <button id="loginBtn" class="primary">Accedi con Google</button>
      <button id="logoutBtn" class="secondary hidden">Esci</button>
      <div class="user" id="userInfo"></div>
    </div>
  </div>

  <div id="appArea" class="hidden">
    <div class="row">
      <input id="itemInput" type="text" placeholder="Es. Pasta, Latte, Frutta..." autocomplete="off" />
      <button id="addBtn" class="primary">Aggiungi</button>
    </div>

    <div class="row">
      <button id="clearBtn" class="danger">Pulisci tutto</button>
    </div>

    <ul id="list"></ul>
    <div class="muted" id="hint"></div>
    <div class="status" id="status"></div>
  </div>

  <div class="muted" id="loginHint">
    Effettua l’accesso per sincronizzare la lista tra telefono e PC.
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signInWithRedirect,
      getRedirectResult,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      doc,
      deleteDoc,
      writeBatch,
      getDocs,
      serverTimestamp,
      enableIndexedDbPersistence
    } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

    // ====== TUA CONFIG (lasciata uguale) ======
    const firebaseConfig = {
      apiKey: "AIzaSyBL3cJvZdy4yfpv5ya5UdSkAYvufZaMmfw",
      authDomain: "lista-spesa-b0e96.firebaseapp.com",
      projectId: "lista-spesa-b0e96",
      storageBucket: "lista-spesa-b0e96.firebasestorage.app",
      messagingSenderId: "752140875055",
      appId: "1:752140875055:web:6655c955b2c47e20e4ddda",
      measurementId: "G-YN35CP6MRL"
    };
    // ========================================

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Offline cache (opzionale)
    try { await enableIndexedDbPersistence(db); } catch (e) {}

    // UI elements
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const userInfo = document.getElementById("userInfo");
    const appArea = document.getElementById("appArea");
    const loginHint = document.getElementById("loginHint");

    const input = document.getElementById("itemInput");
    const addBtn = document.getElementById("addBtn");
    const clearBtn = document.getElementById("clearBtn");
    const listEl = document.getElementById("list");
    const hintEl = document.getElementById("hint");
    const statusEl = document.getElementById("status");

    let unsub = null;

    // Cache locale dello snapshot corrente (serve per riordinare)
    let currentDocs = [];     // [{id, text, order, createdAt}]
    let lastOrder = 0;        // max order
    let migratedOnce = false; // migra vecchi doc senza "order" solo una volta

    function setStatus(msg) { statusEl.textContent = msg || ""; }

    function renderEmpty() {
      listEl.innerHTML = "";
      hintEl.textContent = "Lista vuota. Aggiungi un elemento sopra 👆";
    }

    async function ensureOrderFields(uid, docsFromSnapshot) {
      // Se almeno uno non ha "order", assegna order sequenziale
      const missing = docsFromSnapshot.some(d => typeof d.order !== "number");
      if (!missing) return;

      const batch = writeBatch(db);
      docsFromSnapshot.forEach((d, i) => {
        const ref = doc(db, "users", uid, "items", d.id);
        batch.update(ref, { order: i + 1 });
      });
      await batch.commit();
    }

    async function moveByArrows(itemId, direction) {
      // direction: -1 su, +1 giù
      const idx = currentDocs.findIndex(x => x.id === itemId);
      if (idx < 0) return;

      const swapWith = idx + direction;
      if (swapWith < 0 || swapWith >= currentDocs.length) return;

      const a = currentDocs[idx];
      const b = currentDocs[swapWith];

      const orderA = (typeof a.order === "number") ? a.order : (idx + 1);
      const orderB = (typeof b.order === "number") ? b.order : (swapWith + 1);

      try {
        const uid = auth.currentUser.uid;
        const refA = doc(db, "users", uid, "items", a.id);
        const refB = doc(db, "users", uid, "items", b.id);

        const batch = writeBatch(db);
        batch.update(refA, { order: orderB });
        batch.update(refB, { order: orderA });
        await batch.commit();
      } catch (e) {
        alert("Errore spostamento: " + (e?.message || e));
      }
    }

    async function reorderByDrag(sourceId, targetId) {
      if (!sourceId || !targetId || sourceId === targetId) return;

      const from = currentDocs.findIndex(x => x.id === sourceId);
      const to = currentDocs.findIndex(x => x.id === targetId);
      if (from < 0 || to < 0) return;

      const newArr = [...currentDocs];
      const [moved] = newArr.splice(from, 1);
      newArr.splice(to, 0, moved);

      try {
        const uid = auth.currentUser.uid;
        const batch = writeBatch(db);
        newArr.forEach((item, i) => {
          const ref = doc(db, "users", uid, "items", item.id);
          batch.update(ref, { order: i + 1 });
        });
        await batch.commit();
      } catch (e) {
        alert("Errore drag&drop: " + (e?.message || e));
      }
    }

    function renderItems(docs) {
      listEl.innerHTML = "";

      if (!docs || docs.length === 0) {
        hintEl.textContent = "Lista vuota. Aggiungi un elemento sopra 👆";
        return;
      }
      hintEl.textContent = "";

      docs.forEach(({ id, text }, index) => {
        const li = document.createElement("li");
        li.dataset.id = id;
        li.draggable = true;

        const left = document.createElement("div");
        left.className = "item-left";

        const handle = document.createElement("span");
        handle.className = "drag-handle";
        handle.textContent = "↕";
        handle.title = "Trascina per riordinare (desktop)";

        const span = document.createElement("span");
        span.className = "item-text";
        span.textContent = text;

        left.appendChild(handle);
        left.appendChild(span);

        const actions = document.createElement("div");
        actions.className = "actions";

        // ▲ su
        const upBtn = document.createElement("button");
        upBtn.textContent = "▲";
        upBtn.title = "Sposta su";
        if (index === 0) upBtn.disabled = true;
        upBtn.addEventListener("click", () => moveByArrows(id, -1));

        // ▼ giù
        const downBtn = document.createElement("button");
        downBtn.textContent = "▼";
        downBtn.title = "Sposta giù";
        if (index === docs.length - 1) downBtn.disabled = true;
        downBtn.addEventListener("click", () => moveByArrows(id, +1));

        // Rimuovi
        const delBtn = document.createElement("button");
        delBtn.textContent = "Rimuovi";
        delBtn.addEventListener("click", async () => {
          try {
            const uid = auth.currentUser.uid;
            await deleteDoc(doc(db, "users", uid, "items", id));
          } catch (e) {
            alert("Errore rimozione: " + (e?.message || e));
          }
        });

        actions.appendChild(upBtn);
        actions.appendChild(downBtn);
        actions.appendChild(delBtn);

        li.appendChild(left);
        li.appendChild(actions);
        listEl.appendChild(li);

        // Drag events
        li.addEventListener("dragstart", (e) => {
          e.dataTransfer.setData("text/plain", id);
          e.dataTransfer.effectAllowed = "move";
        });

        li.addEventListener("dragover", (e) => {
          e.preventDefault();
          li.classList.add("drag-over");
        });

        li.addEventListener("dragleave", () => {
          li.classList.remove("drag-over");
        });

        li.addEventListener("drop", (e) => {
          e.preventDefault();
          li.classList.remove("drag-over");
          const sourceId = e.dataTransfer.getData("text/plain");
          reorderByDrag(sourceId, id);
        });
      });
    }

    async function addItem() {
      const value = (input.value || "").trim();
      if (!value) return;

      try {
        const uid = auth.currentUser.uid;
        await addDoc(collection(db, "users", uid, "items"), {
          text: value,
          createdAt: serverTimestamp(),
          order: lastOrder + 1
        });
        input.value = "";
        input.focus();
      } catch (e) {
        alert("Errore aggiunta: " + (e?.message || e));
      }
    }

    async function clearAll() {
      try {
        const uid = auth.currentUser.uid;
        const col = collection(db, "users", uid, "items");
        const snap = await getDocs(col);

        if (snap.size === 0) return;
        const ok = confirm("Vuoi cancellare tutta la lista?");
        if (!ok) return;

        const batch = writeBatch(db);
        snap.forEach(d => batch.delete(d.ref));
        await batch.commit();
      } catch (e) {
        alert("Errore pulizia: " + (e?.message || e));
      }
    }

    // Login / Logout
    const provider = new GoogleAuthProvider();

    async function doLogin() {
      try {
        await signInWithPopup(auth, provider);
      } catch (e) {
        await signInWithRedirect(auth, provider);
      }
    }

    loginBtn.addEventListener("click", doLogin);
    logoutBtn.addEventListener("click", async () => { await signOut(auth); });

    // Dopo redirect login (mobile)
    try { await getRedirectResult(auth); } catch (e) {}

    onAuthStateChanged(auth, (user) => {
      if (unsub) { unsub(); unsub = null; }

      // reset cache ad ogni cambio utente
      currentDocs = [];
      lastOrder = 0;
      migratedOnce = false;

      if (!user) {
        userInfo.textContent = "";
        loginBtn.classList.remove("hidden");
        logoutBtn.classList.add("hidden");
        appArea.classList.add("hidden");
        loginHint.classList.remove("hidden");
        renderEmpty();
        setStatus("");
        return;
      }

      userInfo.textContent = user.email ? `Loggato: ${user.email}` : "Loggato";
      loginBtn.classList.add("hidden");
      logoutBtn.classList.remove("hidden");
      appArea.classList.remove("hidden");
      loginHint.classList.add("hidden");

      // Query: prima order, poi createdAt (stabile)
      const q = query(
        collection(db, "users", user.uid, "items"),
        orderBy("order", "asc"),
        orderBy("createdAt", "asc")
      );

      setStatus("Sincronizzazione attiva ✅");

      unsub = onSnapshot(q, async (snap) => {
        const docsArr = snap.docs.map(d => {
          const data = d.data() || {};
          return {
            id: d.id,
            text: data.text || "",
            order: (typeof data.order === "number") ? data.order : null,
            createdAt: data.createdAt || null
          };
        });

        // Migrazione automatica dei doc esistenti senza "order"
        if (!migratedOnce) {
          migratedOnce = true;
          try { await ensureOrderFields(user.uid, docsArr); } catch (e) { /* ignore */ }
        }

        currentDocs = docsArr;

        lastOrder = currentDocs.reduce((max, d) => {
          const v = (typeof d.order === "number") ? d.order : 0;
          return Math.max(max, v);
        }, 0);

        renderItems(currentDocs);
      }, (err) => {
        setStatus("Errore sync: " + (err?.message || err));
      });

      input.focus();
    });

    addBtn.addEventListener("click", addItem);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") addItem(); });
    clearBtn.addEventListener("click", clearAll);
  </script>
</body>
</html>
